<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6dff"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- 光泽叠层 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#shine)"/>
  <!-- 字母 D -->
  <text x="256" y="390" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="380" fill="#ffffff" text-anchor="middle" letter-spacing="-10">D</text>
  <!-- 底部装饰线 -->
  <rect x="120" y="430" width="272" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
</svg>
